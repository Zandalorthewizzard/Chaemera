name: Release Tauri Preview

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            platform: windows-latest
            args: --config src-tauri/tauri.conf.json
          - name: linux
            platform: ubuntu-22.04
            args: --config src-tauri/tauri.conf.json
          - name: macos-intel
            platform: macos-15-intel
            args: --target x86_64-apple-darwin --config src-tauri/tauri.conf.json
          - name: macos
            platform: macos-latest
            args: --target aarch64-apple-darwin --config src-tauri/tauri.conf.json

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm 11.8.0
        run: npm install -g npm@11.8.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.name, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install node modules
        run: bash scripts/npm-ci-retry.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build preview Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: tauri-preview-[platform]-[arch]-[bundle]
