name: "DCO Check"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - name: "DCO Assistant"
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/dco.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/DCO.md"
          branch: "dco"
          allowlist: claude
          use-dco-flag: true
          lock-pullrequest-aftermerge: false
